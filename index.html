<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tools 2399 Pr | Lord</title>
    <style>
        :root { --main: #ff0000; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; font-family: 'Cairo', sans-serif;
        }

        /* حاوية الفيديو - تثبيت وضمان عدم التحرك */
        #video-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; object-fit: cover;
            filter: brightness(0.5);
            pointer-events: none;
        }

        /* الحاوية الرئيسية لضمان التوسط العمودي والأفقي */
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100dvh;
            padding: 20px;
        }

        /* اللوحة الشفافة - تم ضبط الزوايا والسنترة */
        .glass-card {
            width: 100%;
            max-width: 350px;
            background: rgba(0, 0, 0, 0.5); /* شفافية متوازنة */
            padding: 25px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--main); font-size: 1.8em; margin: 0; text-shadow: 0 0 15px rgba(255,0,0,0.4); }
        .ver { color: #fff; font-size: 0.7em; margin-bottom: 15px; opacity: 0.7; letter-spacing: 1px; }

        .pledge {
            color: #fff; font-size: 0.9em; line-height: 1.6;
            background: rgba(255,255,255,0.05); padding: 15px;
            border-radius: 12px; margin-bottom: 15px; 
            border-right: 4px solid var(--main);
            text-align: justify;
        }

        /* رابط الدخول المطلوب */
        .srv-link {
            display: inline-block; color: #fff;
            text-decoration: underline; font-weight: bold;
            margin-bottom: 20px; font-size: 1.1em;
            transition: 0.3s;
        }
        .srv-link:hover { color: var(--main); }

        input {
            width: 100%; padding: 14px; margin: 8px 0;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.8); color: #fff; text-align: center;
            font-size: 16px; outline: none;
        }

        .btn {
            width: 100%; padding: 15px; background: var(--main);
            color: #fff; border: none; border-radius: 12px;
            font-size: 1.1em; font-weight: bold; cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
        }
        .btn:active { transform: scale(0.96); }

        .nuke-btn { background: transparent; border: 2px solid var(--main); color: var(--main); margin-top: 20px; box-shadow: none; }

        .hidden { display: none; }
        .back { display: block; margin-top: 15px; color: #bbb; font-size: 0.85em; text-decoration: underline; cursor: pointer; }

        .row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255,255,255,0.05); padding: 12px; 
            margin: 8px 0; border-radius: 12px; color: #fff; font-size: 0.9em; 
        }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- الفيديو الجديد مع إعدادات التشغيل التلقائي للجوال -->
    <video id="video-bg" autoplay muted loop playsinline webkit-playsinline preload="auto">
        <source src="https://f.top4top.io/m_374527hn94.mp4" type="video/mp4">
    </video>

    <div class="wrapper">
        
        <!-- صفحة 1 -->
        <div id="p1" class="glass-card">
            <h1>Tools 2399 Pr</h1>
            <div class="ver">LORD | EXCLUSIVE V5</div>
            <div class="pledge">
                أنا المستخدم، أتعهد بأن دخولي لهذه الأداة مسؤوليتي الشخصية، وأن Lord غير مسؤول عن أي استخدام خاطئ أو ضرر ناتج.
            </div>
            <a href="https://discord.gg/2399k" target="_blank" class="srv-link">اضغط دخول إلى سيرفر</a>
            <button class="btn" onclick="move(2)">أوافق وأتعهد بالدخول</button>
        </div>

        <!-- صفحة 2 -->
        <div id="p2" class="glass-card hidden">
            <h1>Login</h1>
            <div class="ver">ادخل بيانات البوت والسيرفر</div>
            <input type="password" id="tk" placeholder="Bot Token">
            <input type="text" id="id" placeholder="Server ID">
            <button class="btn" onclick="check()">اتصال سريع بالخادم</button>
            <span class="back" onclick="move(1)">رجوع للرئيسية</span>
        </div>

        <!-- صفحة 3 -->
        <div id="p3" class="glass-card hidden">
            <h1 style="font-size:1.5em;">Control Panel</h1>
            <div class="ver" style="margin-bottom:10px;">إعدادات الهجوم V5</div>
            <input type="text" id="rn" placeholder="اسم الرومات">
            <input type="text" id="sm" placeholder="رسالة السبام">
            <div class="row"><span>تصفية الرومات</span><input type="checkbox" id="dc"></div>
            <div class="row"><span>طرد الأعضاء</span><input type="checkbox" id="km"></div>
            <button class="btn nuke-btn" onclick="execute()">بدء التدمير V5</button>
            <span class="back" onclick="move(2)">إلغاء الاتصال</span>
        </div>

    </div>

    <script>
        const v = document.getElementById('video-bg');

        // دالة لضمان عمل الفيديو فور التفاعل
        function startVid() {
            v.play().catch(() => {});
        }

        function move(step) {
            startVid();
            document.querySelectorAll('.glass-card').forEach(c => c.classList.add('hidden'));
            document.getElementById('p' + step).classList.remove('hidden');
        }

        function check() {
            const t = document.getElementById('tk').value;
            const i = document.getElementById('id').value;
            if(!t || !i) return alert("يرجى تعبئة البيانات!");
            alert("✓ تم الربط بنجاح، جاري فتح اللوحة...");
            move(3);
        }

        async function execute() {
            const data = {
                token: document.getElementById('tk').value,
                guildId: document.getElementById('id').value,
                roomName: document.getElementById('rn').value || "Nuked-By-Lord",
                message: document.getElementById('sm').value || "@everyone V5 HERE",
                delChannels: document.getElementById('dc').checked,
                kickMembers: document.getElementById('km').checked
            };
            alert("⚠️ تم إعطاء أمر التنفيذ.. راقب السيرفر!");
            fetch('/run-nuke', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        }

        // تشغيل الفيديو عند أي لمسة (ضروري للآيفون)
        document.addEventListener('touchstart', startVid, {once: true});
        document.addEventListener('click', startVid, {once: true});
    </script>
</body>
</html>
