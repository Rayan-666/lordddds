<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tools 2399 Pr | Lord</title>
    <style>
        :root { --main: #ff0000; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; font-family: 'Cairo', sans-serif;
        }

        /* حاوية الفيديو - ضبط المقاس 100/ط */
        #video-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; object-fit: cover;
            filter: brightness(0.5);
            display: block;
        }

        .main-container {
            position: relative; z-index: 1;
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; padding: 20px;
        }

        /* لوحة تحكم شفافة جداً ومصغرة */
        .glass-card {
            width: 100%; max-width: 340px;
            background: rgba(255, 255, 255, 0.05); /* شفافية قوية */
            padding: 20px; border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            backdrop-filter: blur(10px); /* تغبيش بسيط */
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        h1 { color: var(--main); font-size: 1.7em; margin: 0; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .ver { color: #eee; font-size: 0.7em; margin-bottom: 15px; opacity: 0.8; }

        .pledge {
            color: #ffffff; font-size: 0.9em; line-height: 1.6;
            background: rgba(0,0,0,0.4); padding: 10px;
            border-radius: 10px; margin-bottom: 15px; border-right: 3px solid var(--main);
        }

        /* الرابط المطلوب: دخول السيرفر وتحته خط */
        .srv-link {
            display: inline-block; color: #fff;
            text-decoration: underline; font-weight: bold;
            margin-bottom: 15px; font-size: 1em;
        }

        input {
            width: 100%; padding: 12px; margin: 8px 0;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.6); color: #fff; text-align: center;
            font-size: 16px; outline: none;
        }

        .btn {
            width: 100%; padding: 14px; background: var(--main);
            color: #fff; border: none; border-radius: 12px;
            font-size: 1.1em; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); }

        .nuke-btn { background: transparent; border: 2px solid var(--main); color: var(--main); margin-top: 15px; }

        .hidden { display: none; }
        .back { display: block; margin-top: 15px; color: #ccc; font-size: 0.8em; text-decoration: underline; cursor: pointer; }

        .row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 8px 12px; margin: 5px 0; border-radius: 10px; color: #fff; font-size: 0.85em; }
    </style>
</head>
<body>

    <!-- تم استخدام وسم video بخصائص إجبارية للعمل على الجوال -->
    <video id="video-bg" autoplay muted loop playsinline webkit-playsinline poster="https://via.placeholder.com/1080x1920/000000/000000">
        <source src="https://a.top4top.io/m_3745ydpjj9.mp4" type="video/mp4">
    </video>

    <div class="main-container">
        
        <!-- صفحة 1 -->
        <div id="s1" class="glass-card">
            <h1>Tools 2399 Pr</h1>
            <div class="ver">LORD EDITION V5</div>
            <div class="pledge">
                أنا المستخدم أتعهد بأن دخولي مسؤوليتي الشخصية وأن Lord غير مسؤول عن أي استخدام خاطئ.
            </div>
            <a href="https://discord.gg/2399k" target="_blank" class="srv-link">اضغط دخول إلى سيرفر</a>
            <button class="btn" onclick="go(2)">أوافق وأتعهد</button>
        </div>

        <!-- صفحة 2 -->
        <div id="s2" class="glass-card hidden">
            <h1>Login</h1>
            <input type="password" id="t" placeholder="ادخل التوكن">
            <input type="text" id="i" placeholder="ادخل ID السيرفر">
            <button class="btn" onclick="conn()">اتصال بالخادم</button>
            <span class="back" onclick="go(1)">رجوع</span>
        </div>

        <!-- صفحة 3 -->
        <div id="s3" class="glass-card hidden">
            <h2 style="color:var(--main); margin:0 0 10px 0;">Control</h2>
            <input type="text" id="rn" placeholder="اسم الرومات">
            <input type="text" id="sm" placeholder="محتوى الرسالة">
            <div class="row"><span>حذف الرومات</span><input type="checkbox" id="dc"></div>
            <div class="row"><span>طرد الجميع</span><input type="checkbox" id="km"></div>
            <button class="btn nuke-btn" onclick="run()">تنفيذ العملية V5</button>
            <span class="back" onclick="go(2)">فصل الاتصال</span>
        </div>

    </div>

    <script>
        const vid = document.getElementById('video-bg');

        // دالة تشغيل الفيديو الإجبارية عند أول تفاعل
        function forcePlay() {
            vid.play().catch(() => {});
        }

        function go(s) {
            forcePlay(); // تشغيل الفيديو فور الضغط
            document.querySelectorAll('.glass-card').forEach(c => c.classList.add('hidden'));
            document.getElementById('s' + s).classList.remove('hidden');
        }

        function conn() {
            const tk = document.getElementById('t').value;
            const id = document.getElementById('i').value;
            if(!tk || !id) return alert("ادخل البيانات!");
            alert("✓ تم الاتصال بنجاح");
            go(3);
        }

        async function run() {
            const data = {
                token: document.getElementById('t').value,
                guildId: document.getElementById('i').value,
                roomName: document.getElementById('rn').value || "2399-Lord",
                message: document.getElementById('sm').value || "@everyone V5",
                delChannels: document.getElementById('dc').checked,
                kickMembers: document.getElementById('km').checked
            };
            alert("جاري الهجوم بسرعة V5...");
            fetch('/run-nuke', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        }

        // تفعيل الفيديو عند لمس الشاشة لأجهزة الآيفون
        document.addEventListener('touchstart', forcePlay, {once: true});
        document.addEventListener('click', forcePlay, {once: true});
    </script>
</body>
</html>
