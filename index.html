<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tools 2399 Pr | Lord</title>
    <style>
        :root { --main: #ff0000; }
        
        /* إزالة كافة تأثيرات الضغط والوميض */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            -webkit-touch-callout: none;
            user-select: none;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; font-family: 'Cairo', sans-serif;
        }

        /* ضبط الفيديو ليكون ثابت وخلف كل شيء */
        #video-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; /* الفيديو في الطبقة 1 */
            object-fit: cover;
            filter: brightness(0.7);
        }

        /* الحاوية فوق الفيديو مباشرة */
        .wrapper {
            position: relative;
            z-index: 2; /* اللوحة في الطبقة 2 فوق الفيديو */
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100dvh;
            padding: 15px;
        }

        /* لوحة صغيرة جداً وشفافة (Glassmorphism) */
        .glass-card {
            width: 85%;
            max-width: 320px; /* تصغير اللوحة */
            background: rgba(255, 255, 255, 0.03); /* شفافة جداً */
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            backdrop-filter: blur(8px); /* تغبيش خفيف جداً لتبيين المقطع */
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h1 { color: var(--main); font-size: 1.5em; margin: 0; text-shadow: 0 0 10px rgba(255,0,0,0.4); }
        .ver { color: #fff; font-size: 0.65em; margin-bottom: 12px; opacity: 0.8; }

        .pledge {
            color: #fff; font-size: 0.85em; line-height: 1.5;
            background: rgba(0,0,0,0.3); padding: 10px;
            border-radius: 10px; margin-bottom: 12px; 
            border-right: 3px solid var(--main);
            text-align: right;
        }

        .srv-link {
            display: inline-block; color: #fff;
            text-decoration: underline; font-weight: bold;
            margin-bottom: 15px; font-size: 1em;
        }

        input {
            width: 100%; padding: 12px; margin: 6px 0;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.5); color: #fff; text-align: center;
            font-size: 16px;
        }

        .btn {
            width: 100%; padding: 12px; background: var(--main);
            color: #fff; border: none; border-radius: 10px;
            font-size: 1em; font-weight: bold; cursor: pointer;
            transition: 0.2s;
        }
        /* حذف أي تأثير حركي عند الضغط */
        .btn:active { opacity: 0.8; }

        .nuke-btn { background: transparent; border: 2px solid var(--main); color: var(--main); margin-top: 15px; }

        .hidden { display: none; }
        .back { display: block; margin-top: 12px; color: #ccc; font-size: 0.8em; text-decoration: underline; cursor: pointer; }

        .row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.4); padding: 10px; 
            margin: 6px 0; border-radius: 10px; color: #fff; font-size: 0.85em; 
        }
    </style>
</head>
<body>

    <video id="video-bg" autoplay muted loop playsinline webkit-playsinline>
        <source src="https://f.top4top.io/m_374527hn94.mp4" type="video/mp4">
    </video>

    <div class="wrapper">
        
        <div id="p1" class="glass-card">
            <h1>Tools 2399 Pr</h1>
            <div class="ver">BY LORD | V5</div>
            <div class="pledge">
                أنا المستخدم، أتعهد بأن دخولي مسؤوليتي الشخصية، وأن Lord غير مسؤول عن أي ضرر.
            </div>
            <a href="https://discord.gg/2399k" target="_blank" class="srv-link">اضغط دخول إلى سيرفر</a>
            <button class="btn" onclick="move(2)">أوافق وأتعهد</button>
        </div>

        <div id="p2" class="glass-card hidden">
            <h1>Login</h1>
            <input type="password" id="tk" placeholder="التوكن">
            <input type="text" id="id" placeholder="ID السيرفر">
            <button class="btn" onclick="check()">اتصال</button>
            <span class="back" onclick="move(1)">رجوع</span>
        </div>

        <div id="p3" class="glass-card hidden">
            <h1 style="font-size:1.3em;">Control</h1>
            <input type="text" id="rn" placeholder="اسم الرومات">
            <input type="text" id="sm" placeholder="الرسالة">
            <div class="row"><span>حذف الرومات</span><input type="checkbox" id="dc"></div>
            <div class="row"><span>طرد الأعضاء</span><input type="checkbox" id="km"></div>
            <button class="btn nuke-btn" onclick="execute()">تدمير V5</button>
            <span class="back" onclick="move(2)">إلغاء</span>
        </div>

    </div>

    <script>
        const v = document.getElementById('video-bg');

        function startVid() { v.play().catch(()=>{}); }

        function move(step) {
            startVid();
            document.querySelectorAll('.glass-card').forEach(c => c.classList.add('hidden'));
            document.getElementById('p' + step).classList.remove('hidden');
        }

        function check() {
            if(!document.getElementById('tk').value || !document.getElementById('id').value) return alert("اكمل البيانات!");
            alert("✓ تم الاتصال");
            move(3);
        }

        async function execute() {
            const data = {
                token: document.getElementById('tk').value,
                guildId: document.getElementById('id').value,
                roomName: document.getElementById('rn').value || "Lord-V5",
                message: document.getElementById('sm').value || "@everyone V5",
                delChannels: document.getElementById('dc').checked,
                kickMembers: document.getElementById('km').checked
            };
            alert("بدء العملية..");
            fetch('/run-nuke', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        }

        document.addEventListener('touchstart', startVid, {once: true});
        document.addEventListener('click', startVid, {once: true});
    </script>
</body>
</html>
