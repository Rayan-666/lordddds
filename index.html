<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tools 2399 Pr | Lord</title>
    <style>
        :root { --main-color: #ff0000; --success-color: #00ff41; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Cairo', sans-serif; background-color: #000; }
        .video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); display: block; }
        .container { position: relative; z-index: 1; display: flex; justify-content: center; align-items: center; height: 100dvh; }
        .card { width: 85%; max-width: 380px; background: rgba(0, 0, 0, 0.4); padding: 25px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.15); text-align: center; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        h1 { font-size: 1.8em; color: var(--main-color); margin-bottom: 5px; }
        .sub-title { color: #fff; margin-bottom: 15px; font-size: 0.8em; opacity: 0.9; }
        .pledge-box { background: rgba(0, 0, 0, 0.7); border-right: 4px solid var(--main-color); padding: 12px; margin-bottom: 15px; text-align: right; font-size: 0.95em; line-height: 1.6; color: #ffffff; border-radius: 8px; }
        .discord-link { display: inline-block; color: #7289da; text-decoration: none; margin-bottom: 15px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0, 0, 0, 0.8); color: #fff; box-sizing: border-box; outline: none; text-align: center; font-size: 16px; }
        #status-msg { color: var(--success-color); font-weight: bold; margin-top: 10px; display: none; text-shadow: 0 0 10px var(--success-color); }
        .btn { width: 100%; padding: 14px; background: var(--main-color); color: white; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nuke-btn { background: transparent; border: 2px solid var(--main-color); color: var(--main-color); margin-top: 15px; }
        .back-link { display: block; margin-top: 15px; color: #fff; font-size: 0.85em; opacity: 0.7; cursor: pointer; }
        .hidden { display: none; }
        .option-item { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.6); padding: 10px; margin: 8px 0; border-radius: 10px; color: white; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="video-container">
        <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
            <source src="https://a.top4top.io/m_3745ydpjj9.mp4" type="video/mp4">
        </video>
    </div>
    <div class="container">
        <!-- صفحة 1 -->
        <div id="step1" class="card">
            <h1>Tools 2399 Pr</h1>
            <div class="sub-title">Power By Lord | V5</div>
            <div class="pledge-box">أنا المستخدم، أتعهد بأن دخولي لهذه الأداة مسؤوليتي الشخصية، وأن <b style="color:var(--main-color)">Lord</b> غير مسؤول عن أي استخدام خاطئ.</div>
            <a href="https://discord.gg/2399k" target="_blank" class="discord-link">Discord: 2399k</a>
            <button class="btn" onclick="nextStep(2)">أوافق وأتعهد</button>
        </div>
        <!-- صفحة 2 -->
        <div id="step2" class="card hidden">
            <h1>Login</h1>
            <input type="password" id="botToken" placeholder="Bot Token">
            <input type="text" id="serverID" placeholder="Server ID">
            <div id="status-msg">✓ تم الاتصال بنجاح</div>
            <button class="btn" id="loginBtn" onclick="validateAndConnect()">اتصال بالخادم</button>
            <span class="back-link" onclick="nextStep(1)">رجوع للتعهد</span>
        </div>
        <!-- صفحة 3 -->
        <div id="step3" class="card hidden">
            <h2 style="color:var(--main-color); margin:0 0 10px 0;">Control Panel</h2>
            <input type="text" id="roomName" placeholder="اسم الرومات">
            <input type="text" id="spamMsg" placeholder="محتوى الرسالة">
            <div class="option-item"><span>حذف الرومات</span><input type="checkbox" id="delCheck"></div>
            <div class="option-item"><span>طرد الجميع</span><input type="checkbox" id="kickCheck"></div>
            <button class="btn nuke-btn" onclick="executeNuke()">تنفيذ العملية</button>
            <span class="back-link" onclick="nextStep(2)">فصل الاتصال</span>
        </div>
    </div>
    <script>
        function nextStep(s){ document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden')); document.getElementById('step'+s).classList.remove('hidden'); }
        function validateAndConnect(){
            const t = document.getElementById('botToken').value; const i = document.getElementById('serverID').value;
            if(!t || !i) return alert("ادخل البيانات!");
            const btn = document.getElementById('loginBtn'); btn.innerText = "جاري الاتصال...";
            setTimeout(()=>{ document.getElementById('status-msg').style.display="block"; setTimeout(()=>{ nextStep(3); btn.innerText="اتصال بالخادم"; },1500); },1000);
        }
        async function executeNuke() {
            const data = {
                token: document.getElementById('botToken').value,
                guildId: document.getElementById('serverID').value,
                roomName: document.getElementById('roomName').value || "Tools-2399-Pr",
                message: document.getElementById('spamMsg').value || "Nuked By Lord V5",
                delChannels: document.getElementById('delCheck').checked,
                kickMembers: document.getElementById('kickCheck').checked
            };
            alert("بدء العملية بسرعة فائقة V5...");
            await fetch('/run-nuke', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        }
    </script>
</body>
</html>
